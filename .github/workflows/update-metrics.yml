name: Update Dashboard Metrics

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install

      - name: Run indexer
        id: indexer
        continue-on-error: true
        env:
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          SONIC_RPC_URL: ${{ secrets.SONIC_RPC_URL }}
          AVAX_RPC_URL: ${{ secrets.AVAX_RPC_URL }}
          BNB_RPC_URL: ${{ secrets.BNB_RPC_URL }}
        run: |
          set -e
          attempts=0
          until [ $attempts -ge 5 ]
          do
            attempts=$((attempts+1))
            echo "Indexer attempt $attempts/5"
            if npm run index && npm run index:puts && npm run index:nav && npm run index:buys; then
              echo "Indexer succeeded"
              break
            fi
            if [ $attempts -lt 5 ]; then
              echo "Indexer failed, retrying in 30s..."
              sleep 30
            fi
          done
          if [ $attempts -ge 5 ]; then
            echo "Indexer failed after 5 attempts"
            exit 1
          fi

      - name: Commit updated metrics
        if: steps.indexer.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/metrics.json data/state.json public/data/puts-marketplace.json data/puts-state.json public/data/nav.json data/nav-state.json public/data/protocol-ft-buys.json data/protocol-buys-state.json
          if git diff --cached --quiet; then
            echo "No metric changes"
            exit 0
          fi
          git commit -m "chore: update dashboard metrics"
          git push

      - name: Skip cycle on RPC failure
        if: steps.indexer.outcome != 'success'
        run: |
          echo "::warning::Indexer failed this cycle due to RPC issues. Keeping last good metrics snapshot."
