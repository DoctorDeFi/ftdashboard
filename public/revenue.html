<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FT Revenue Dashboard</title>
    <meta
      name="description"
      content="Revenue dashboard for Flying Tulip: PUT marketplace revenue, protocol buybacks, and ftUSD mint/redeem fees."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FT Dashboard" />
    <meta property="og:title" content="Flying Tulip Revenue dashboard" />
    <meta
      property="og:description"
      content="Track PUT marketplace revenue, protocol buybacks, and ftUSD fee generation."
    />
    <meta property="og:url" content="https://ftdashboard.xyz/revenue.html" />
    <meta property="og:image" content="https://ftdashboard.xyz/og-image-supply.png?v=6" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Flying Tulip Revenue dashboard" />
    <meta
      name="twitter:description"
      content="Track PUT marketplace revenue, protocol buybacks, and ftUSD fee generation."
    />
    <meta name="twitter:image" content="https://ftdashboard.xyz/og-image-supply.png?v=6" />
    <link rel="stylesheet" href="/revenue.css" />
  </head>
  <body>
    <main class="container">
      <section class="hero-card">
        <div>
          <p class="eyebrow">Flying Tulip</p>
          <h1>Revenue Dashboard</h1>
          <p class="subtitle">Revenue generated by Flying Tulip protocol</p>
          <div class="nav-links">
            <a href="/">Supply Dashboard</a>
            <a href="/puts-marketplace.html">PUTs Marketplace</a>
          </div>
        </div>
        <div class="hero-meta">
          <p id="updatedAt">Updated: --</p>
          <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle light and dark mode">Dark mode</button>
        </div>
      </section>

      <section id="summaryCards"></section>

      <section class="panel chart-panel" id="revenueChartPanel">
        <div class="chart-head">
          <h2>Daily Revenue</h2>
          <div class="chart-tabs" id="chartTabs">
            <button class="range-tab active" data-range="7" type="button">7D</button>
            <button class="range-tab" data-range="30" type="button">30D</button>
            <button class="range-tab" data-range="all" type="button">All</button>
          </div>
        </div>
        <p class="chart-meta" id="chartMeta">--</p>
        <div class="chart-wrap">
          <svg id="revenueChart" viewBox="0 0 1200 360" preserveAspectRatio="none"></svg>
          <div class="chart-tooltip" id="chartTooltip" hidden></div>
        </div>
      </section>

      <footer class="footnote">
        <p class="disclaimer-bottom">Community-made dashboard. Not official. Actual numbers can vary. Treat this as a rough approximation, not real-time final accounting.</p>
        <p class="credit">Built by <a href="https://x.com/doctordefi" target="_blank" rel="noopener noreferrer">@doctordefi</a></p>
      </footer>
    </main>

    <script type="module" src="/revenue.js"></script>
  </body>
</html>
